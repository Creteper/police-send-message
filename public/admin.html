<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>消息管理系统 - 管理员</title>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>
  <!-- 登录页面 -->
  <div id="loginPage" class="login-container">
    <div class="login-box">
      <h1>管理员登录</h1>
      <form id="loginForm">
        <div class="form-group">
          <label for="username">用户名</label>
          <input type="text" id="username" placeholder="请输入用户名" required>
        </div>
        <div class="form-group">
          <label for="password">密码</label>
          <input type="password" id="password" placeholder="请输入密码" required>
        </div>
        <button type="submit" class="btn" id="loginBtn">登录</button>
        <div id="loginError" class="error-msg"></div>
      </form>
    </div>
  </div>

  <!-- 管理页面 -->
  <div id="adminPage" class="admin-container">
    <header class="header">
      <h1>消息管理系统</h1>
      <div class="user-info">
        <span class="user-name" id="userName"></span>
        <button class="btn-logout" id="logoutBtn">退出登录</button>
      </div>
    </header>

    <main class="main-content">
      <!-- 工具栏 -->
      <div class="toolbar">
        <div class="filter-group">
          <label>状态筛选:</label>
          <select id="statusFilter">
            <option value="">全部状态</option>
            <option value="unread">未读</option>
            <option value="read">已读</option>
            <option value="timeout">超时</option>
            <option value="confirmed">已确认</option>
            <option value="rejected">已退回</option>
          </select>
        </div>
        <div class="batch-actions">
          <button class="btn-action btn-timeout" id="batchTimeoutBtn">批量设为超时</button>
          <button class="btn-action btn-cancel-timeout" id="batchCancelTimeoutBtn">批量取消超时</button>
          <button class="btn-action btn-refresh" id="refreshBtn">刷新</button>
        </div>
      </div>

      <!-- 消息表格 -->
      <div class="table-container">
        <table>
          <thead>
            <tr>
              <th class="checkbox-cell">
                <input type="checkbox" id="selectAll">
              </th>
              <th>ID</th>
              <th>违章信息</th>
              <th>发送警察</th>
              <th>接收村长</th>
              <th>所属村庄</th>
              <th>状态</th>
              <th>发送时间</th>
              <th>操作</th>
            </tr>
          </thead>
          <tbody id="messageTableBody">
            <tr>
              <td colspan="9" class="loading">加载中...</td>
            </tr>
          </tbody>
        </table>
      </div>

      <!-- 分页 -->
      <div class="pagination">
        <button id="prevBtn">上一页</button>
        <span class="page-info" id="pageInfo">第 1 页 / 共 1 页</span>
        <button id="nextBtn">下一页</button>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
